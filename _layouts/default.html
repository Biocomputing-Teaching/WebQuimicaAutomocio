<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>{{ page.title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script
    src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"
    type="text/javascript">
</script>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        line-height: 1.55;
      }
      .topbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        gap: 1rem;
        padding: 0.85rem 1rem;
        background: #17324d;
        border-bottom: 2px solid #0f2235;
      }
      .topbar a {
        color: #ffffff;
        text-decoration: none;
        font-weight: 600;
      }
      .topbar a:hover {
        text-decoration: underline;
      }
      main {
        max-width: 1000px;
        margin: 1.2rem auto;
        padding: 0 1rem 2rem 1rem;
      }
      footer {
        border-top: 1px solid #ddd;
        margin-top: 2rem;
        padding-top: 1rem;
        color: #555;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <nav class="topbar">
      <a href="{{ '/index' | relative_url }}">Inici</a>
      <a href="{{ '/capitols' | relative_url }}">Capítols</a>
      <a href="{{ '/autoavaluacions' | relative_url }}">Autoavaluacions</a>
      <a href="{{ '/links' | relative_url }}">Enllaços</a>
      <a href="{{ '/about' | relative_url }}">Sobre</a>
    </nav>
    <main>
      <h1>{{ page.title }}</h1>
      <section>
        {{ content }}
      </section>
      <footer>
        © Web Química Automoció
      </footer>
    </main>
  </body>
</html>
